<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="styles.css">
    <title>Email Automator Pro</title>
</head>
<body>
    <div class="EmailApp">
        <div class="Header">
            <div class="HeaderTitle">Email Automator</div>
        </div>

        <div class="Body">
            <section class="AuthSection">
                <button id="auth-btn" onclick="authService.startAuth()">Connect Google Account</button>
            </section>

            <section class="RecipientSection">
                <label>Target Group</label>
                <div class="GroupRow">
                    <button class="GroupButton" onclick="uiHandler.selectGroup('lapa', this)">Lapa</button>
                    <button class="GroupButton" onclick="uiHandler.selectGroup('perdizes', this)">Perdizes</button>
                </div>
            </section>

            <input type="text" id="subject" placeholder="Subject" oninput="uiHandler.updatePreview()">
            <textarea id="notes" placeholder="Content" oninput="uiHandler.updatePreview()"></textarea>
            
            <button class="SendButton" id="send-btn" onclick="emailService.send()">Send Email</button>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script src="authService.js"></script>
    <script src="emailService.js"></script>
    <script src="uiHandler.js"></script>
</body>
</html>
